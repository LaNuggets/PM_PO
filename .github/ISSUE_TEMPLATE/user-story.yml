name: User Story
description: Template pour une user story AIDA (conforme au PDF)
title: "[US-XX] En tant que ..., je veux ..., afin de ..."
labels: []
body:
  - type: markdown
    attributes:
      value: |
        ## Merci de respecter le format imposé par le Product Owner (Annexe Phase 1)
        Applique aussi les **labels** : `priority:*`, `estimation:*`, `epic:*`
  - type: textarea
    id: user-story
    attributes:
      label: User Story
      description: Reprendre la user story complète
      placeholder: En tant que ..., je veux ..., afin de ...
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Critères d'acceptation
      description: Lister des critères testables
      placeholder: |
        - ...
        - ...
    validations:
      required: true
  - type: textarea
    id: dod
    attributes:
      label: Definition of Done
      value: |
        - Code poussé
        - Pull Request ouverte vers `dev`
        - Revue effectuée
        - Fonctionnalité démontrable
        - Issue mise à jour dans le board
    validations:
      required: true
  - type: textarea
    id: subtasks
    attributes:
      label: Sous-tâches
      description: Découper le travail en tâches concrètes (checklist markdown)
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: input
    id: branch
    attributes:
      label: Branche associée
      description: Format imposé `type/US-XX-githubuser-nom-court`
      placeholder: feature/US-XX-githubuser-nom-court
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priorité (MoSCoW)
      options:
        - Must
        - Should
        - Could
        - Won't for now
    validations:
      required: true
  - type: dropdown
    id: estimation
    attributes:
      label: Estimation (story points)
      options:
        - "1"
        - "2"
        - "3"
        - "5"
        - "8"
    validations:
      required: true
